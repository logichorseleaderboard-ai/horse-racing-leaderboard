<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Horse龍虎榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f7fc; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 25px; border-bottom: 2px solid #cbd5e1; padding-bottom: 8px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; padding: 10px 22px; border-radius: 40px; cursor: pointer; color: #475569; transition: 0.3s; }
        .tab-btn.active { background: #1e6f3f; color: white; }
        .page { display: none; }
        .page.active-page { display: block; }
        .card { background: white; border-radius: 20px; padding: 24px; margin-bottom: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { font-size: 1.4rem; margin-bottom: 1.2rem; border-left: 5px solid #1e6f3f; padding-left: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; }
        .badge { background: #f0fdf4; color: #166534; padding: 4px 12px; border-radius: 20px; font-size: 0.85rem; border: 1px solid #dcfce7; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        select, input, button { padding: 8px 12px; border-radius: 8px; border: 1px solid #cbd5e1; }
        button { background: #1e6f3f; color: white; border: none; cursor: pointer; }
        button.danger { background: #be123c; }
        .win-true { background: #22c55e; color: white; }
        .win-false { background: #94a3b8; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn" data-page="home">🐎 主頁</button>
        <button class="tab-btn" data-page="enter">✍️ 投注</button>
        <button class="tab-btn" data-page="admin">⚙️ 管理</button>
        <button class="tab-btn" data-page="bets-manage">📋 紀錄管理</button>
    </div>

    <div id="home-page" class="page">
        <div class="card">
            <h2>🐎 最新投注表</h2>
            <div class="filter-bar">
                <button onclick="refreshHomePage()">🔄 刷新數據</button>
            </div>
            <table id="homeBetTable">
                <thead><tr><th>場次</th><th>參賽者</th><th>玩法</th><th>詳情</th><th>金額</th><th>分析</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="enter-page" class="page">
        <div class="card">
            <h2>✍️ 新增投注</h2>
            <form id="betForm">
                <p>參賽者：<select id="betParticipantSelect" required></select></p>
                <p>賽日：<select id="betRaceDate" required></select></p>
                <p>金額：<input type="number" id="betAmount" value="100" required></p>
                <p>玩法：<input type="text" id="betBetType" placeholder="例如：獨贏" required></p>
                <p>馬匹：<input type="text" id="betDetail" required></p>
                <button type="submit" style="width:100%; margin-top:10px;">提交投注</button>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card">
            <h2>⚙️ 系統管理</h2>
            <p>管理功能加載中...</p>
        </div>
    </div>

    <div id="bets-manage-page" class="page">
        <div class="card">
            <h2>📋 紀錄維護</h2>
            <table id="manageBetsTable">
                <thead><tr><th>參賽者</th><th>玩法</th><th>金額</th><th>狀態</th><th>管理</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // --- 1. 配置與初始化 (使用 var 避免宣告衝突) ---
    var CONFIG = {
        URL: "https://dmgauesvjpelufjrnlzf.supabase.co",
        KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZ2F1ZXN2anBlbHVmanJubHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MTAsImV4cCI6MjA5Mjg2NzkxMH0.IHezXCywHMpKW7t6V9wAXVab-9j8O5Rg2uRu2WvLzk4",
        PASS: "LBadmin"
    };

    // 確保全域只有一個 Supabase 實例
    if (!window.supabaseClient) {
        window.supabaseClient = window.supabase.createClient(CONFIG.URL, CONFIG.KEY);
    }
    var supabase = window.supabaseClient;

    // --- 2. 核心功能 ---
    function switchPage(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        
        const target = document.getElementById(pageId + "-page");
        if (target) target.classList.add("active-page");
        
        const btn = document.querySelector(`[data-page="${pageId}"]`);
        if (btn) btn.classList.add("active");

        if (pageId === 'home') refreshHomePage();
        if (pageId === 'bets-manage') loadAllBetsForManage();
    }

    async function loadParticipants() {
        const { data } = await supabase.from('participants').select('name');
        const select = document.getElementById("betParticipantSelect");
        if (select && data) {
            select.innerHTML = data.map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }
    }

    async function loadRaceDays() {
        const { data } = await supabase.from('race_days').select('race_date').order('race_date', {ascending: false});
        const select = document.getElementById("betRaceDate");
        if (select && data) {
            select.innerHTML = data.map(d => `<option value="${d.race_date}">${d.race_date}</option>`).join('');
        }
    }

    async function refreshHomePage() {
        const tbody = document.querySelector("#homeBetTable tbody");
        tbody.innerHTML = "<tr><td colspan='6'>載入中...</td></tr>";
        const { data, error } = await supabase.from('bets').select('*').order('id', {ascending: false});
        if (data) {
            tbody.innerHTML = data.map(b => `
                <tr><td>${b.race_no || '-'}</td><td><span class="badge">${b.participant}</span></td>
                <td>${b.bet_type}</td><td>${b.bet_detail}</td><td>$${b.amount}</td><td>${b.reason || '-'}</td></tr>
            `).join('');
        }
    }

    async function loadAllBetsForManage() {
        const tbody = document.querySelector("#manageBetsTable tbody");
        const { data } = await supabase.from('bets').select('*').order('id', {ascending: false});
        if (data) {
            tbody.innerHTML = data.map(b => `
                <tr><td>${b.participant}</td><td>${b.bet_type}</td><td>$${b.amount}</td>
                <td><button class="${b.is_win?'win-true':'win-false'}" onclick="toggleWin(${b.id},${b.is_win})">${b.is_win?'已勝':'未勝'}</button></td>
                <td><button onclick="delBet(${b.id})" class="danger">刪</button></td></tr>
            `).join('');
        }
    }

    // --- 3. 綁定事件 ---
    document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.onclick = () => switchPage(btn.dataset.page);
    });

    document.getElementById("betForm").onsubmit = async (e) => {
        e.preventDefault();
        const entry = {
            participant: document.getElementById("betParticipantSelect").value,
            race_date: document.getElementById("betRaceDate").value,
            amount: parseInt(document.getElementById("betAmount").value),
            bet_type: document.getElementById("betBetType").value,
            bet_detail: document.getElementById("betDetail").value,
            is_win: false
        };
        const { error } = await supabase.from('bets').insert([entry]);
        if (error) alert("失敗: " + error.message);
        else { alert("提交成功！"); refreshHomePage(); switchPage('home'); }
    };

    window.toggleWin = async (id, cur) => {
        await supabase.from('bets').update({is_win: !cur}).eq('id', id);
        loadAllBetsForManage();
    };

    window.delBet = async (id) => {
        if (confirm("確定刪除？")) {
            await supabase.from('bets').delete().eq('id', id);
            loadAllBetsForManage();
        }
    };

    // --- 4. 啟動 ---
    window.onload = async () => {
        console.log("系統啟動中...");
        await loadParticipants();
        await loadRaceDays();
        switchPage("home");
    };
</script>

</body>
</html>
