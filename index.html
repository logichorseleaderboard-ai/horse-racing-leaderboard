<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬龍虎榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; color: #2c3e50; transition: 0.3s; }
        .tab-btn.active { background: #1e6f3f; color: white; }
        .page { display: none; }
        .page.active-page { display: block; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; border-left: 5px solid #1e6f3f; padding-left: 16px; }
        .filter-bar { display: flex; gap: 20px; margin-bottom: 20px; background: #f8fafc; padding: 16px; border-radius: 20px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        select, input, textarea, button { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; }
        button { background: #1e6f3f; color: white; border: none; font-weight: 600; cursor: pointer; }
        button.secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
        button.danger { background: #b91c1c; color: white; }
        .responsive-table-container { overflow-x: auto; width: 100%; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; min-width: 600px; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; font-weight: 600; }
        .badge { background: #e6f7ec; color: #0b5e2e; padding: 4px 10px; border-radius: 30px; display: inline-block; margin: 4px; }
        .stat-cards { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-item { background: #f0f9f4; padding: 16px; border-radius: 20px; flex: 1; min-width: 180px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1e6f3f; }
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .form-row label { width: 100px; font-weight: 600; }
        .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 200px; }
        .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .password-box { background: white; padding: 30px; border-radius: 24px; text-align: center; width: 320px; }
        .password-box input { width: 100%; margin: 15px 0; }
        .error-msg { color: #b91c1c; font-size: 0.85rem; margin-bottom: 10px; }
        .sub-bet-type-group { display: none; background: #f8fafc; padding: 12px 16px; border-radius: 16px; margin-bottom: 16px; }
        .win-toggle-btn { cursor: pointer; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; border: none; }
        .win-true { background: #22c55e; color: white; }
        .win-false { background: #ef4444; color: white; }
        .capital-info { background: linear-gradient(135deg, #1e6f3f, #2a8a4a); color: white; padding: 15px 25px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .capital-amount { font-size: 1.8rem; font-weight: 700; }
        @media (max-width: 768px) { .form-row label { width: 100%; } .capital-info { flex-direction: column; text-align: center; gap: 10px; } }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-page="home">🐎 主頁</button>
        <button class="tab-btn" data-page="enter">✍️ 投注</button>
        <button class="tab-btn" data-page="admin">⚙️ 管理</button>
        <button class="tab-btn" data-page="bets-manage">📋 紀錄管理</button>
        <button class="tab-btn" data-page="data">📊 每月數據</button>
    </div>

    <div id="home-page" class="page active-page">
        <div class="card">
            <h2>🐎 下個賽日投注表</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>場次</label><select id="homeRaceSelect"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>參賽者</label><select id="homeParticipantSelect"><option value="all">全部</option></select></div>
                <button id="refreshHomeBtn">🔄 刷新</button>
            </div>
            <div class="responsive-table-container">
                <table id="homeBetTable">
                    <thead><tr><th>場次</th><th>參賽者</th><th>玩法</th><th>投注詳情</th><th>金額</th><th>原因</th></tr></thead>
                    <tbody><tr><td colspan="6" style="text-align:center; padding:40px;">載入中...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="enter-page" class="page">
        <div class="card">
            <h2>✍️ 新增投注</h2>
            <div class="capital-info">
                <span>💰 本月可用本金</span>
                <span class="capital-amount" id="availableCapital">請選擇參賽者</span>
            </div>
            <form id="betForm">
                <div class="form-row"><label>參賽者</label><select id="betParticipantSelect" required><option value="">-- 請選擇 --</option></select></div>
                <div class="form-row"><label>賽日</label><select id="betRaceDate"></select></div>
                <div class="form-row"><label>場次</label><select id="betRaceNo"></select></div>
                <div class="form-row"><label>玩法</label><select id="betBetType" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="獨贏">獨贏</option><option value="位置">位置</option><option value="連贏">連贏</option><option value="位置Q">位置Q</option>
                    <option value="二重彩">二重彩</option><option value="三重彩">三重彩</option><option value="四重彩">四重彩</option>
                    <option value="過關">過關</option>
                </select></div>
                <div id="subBetTypeGroup" class="sub-bet-type-group">
                    <label>子玩法</label>
                    <select id="betSubType">
                        <option value="">-- 請選擇 --</option><option value="單式">單式</option><option value="複式">複式</option><option value="馬膽">馬膽</option>
                    </select>
                </div>
                <div class="form-row"><label>投注詳情</label><input type="text" id="betDetail" required placeholder="例: 1, 3, 5"></div>
                <div class="form-row"><label>金額 ($)</label><input type="number" id="betAmount" required min="10" step="10" value="100"></div>
                <div class="form-row"><label>原因</label><textarea id="betReason" rows="2" placeholder="備註..."></textarea></div>
                <div style="display:flex; gap:10px;"><button type="submit">💾 儲存投注</button><button type="button" id="clearBetForm" class="secondary">清除</button></div>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card">
            <h2>👥 參賽者管理</h2>
            <div class="form-row"><input type="text" id="newParticipantName" placeholder="輸入姓名"><button id="addParticipantBtn">➕ 加入</button></div>
            <div id="participantList"></div>
        </div>
        <div class="card">
            <h2>📅 賽日管理</h2>
            <div class="form-row"><input type="date" id="newRaceDate"><button id="addRaceDateBtn">📅 加入賽日</button></div>
            <ul id="raceDateList" style="list-style:none;"></ul>
        </div>
    </div>

    <div id="bets-manage-page" class="page">
        <div class="card">
            <h2>📋 投注紀錄管理</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>參賽者</label><select id="manageParticipantFilter"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>賽日</label><select id="manageRaceDateFilter"><option value="all">全部</option></select></div>
                <button id="refreshManageBtn" class="secondary">🔄 刷新列表</button>
            </div>
            <div class="responsive-table-container">
                <table id="manageBetsTable">
                    <thead><tr><th>ID</th><th>參賽者</th><th>賽日</th><th>玩法</th><th>金額</th><th>勝負</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="data-page" class="page">
        <div class="card">
            <h2>📊 每月數據統計</h2>
            <div class="filter-bar"><select id="monthSelector"></select><button id="refreshDataBtn">📈 更新圖表</button></div>
            <div id="monthlyStatsContainer"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const ADMIN_PASSWORD = "LBadmin";
    const MY_SUPABASE_URL = "https://dmgauesvjpelufjrnlzf.supabase.co";
    const MY_SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZ2F1ZXN2anBlbHVmanJubHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MTAsImV4cCI6MjA5Mjg2NzkxMH0.IHezXCywHMpKW7t6V9wAXVab-9j8O5Rg2uRu2WvLzk4";    
    const supabase = window.supabase.createClient(MY_SUPABASE_URL, MY_SUPABASE_ANON_KEY);

    let participantsList = [];
    let raceDaysList = [];
    let allBets = [];

    // ========== 核心分頁切換邏輯 (解決重載失效) ==========
    function switchPage(pageId) {
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));

        const targetPage = document.getElementById(`${pageId}-page`);
        const targetBtn = document.querySelector(`.tab-btn[data-page="${pageId}"]`);
        
        if (targetPage && targetBtn) {
            targetPage.classList.add("active-page");
            targetBtn.classList.add("active");
        }

        // 切換頁面時觸發數據加載
        if (pageId === "home") refreshHomePage();
        if (pageId === "bets-manage") loadAllBetsForManage();
        if (pageId === "admin") { loadAllParticipants(); loadAllRaceDays(); }
        if (pageId === "data") refreshMonthSelector();
    }

    function setupTabs() {
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const pageId = btn.dataset.page;
                if (pageId === "admin" || pageId === "bets-manage") {
                    if (sessionStorage.getItem("adminUnlocked") !== "true") {
                        showPasswordModal(() => {
                            sessionStorage.setItem("adminUnlocked", "true");
                            switchPage(pageId);
                        });
                        return;
                    }
                }
                switchPage(pageId);
            });
        });
    }

    // ========== 密碼彈窗 ==========
    function showPasswordModal(onSuccess) {
        const overlay = document.createElement("div");
        overlay.className = "password-overlay";
        overlay.innerHTML = `
            <div class="password-box">
                <h3>🔐 管理員驗證</h3>
                <input type="password" id="adminPw" placeholder="請輸入密碼" autofocus>
                <div id="pwErr" class="error-msg"></div>
                <button id="pwSub">確認</button> <button id="pwCan" class="secondary">取消</button>
            </div>`;
        document.body.appendChild(overlay);
        document.getElementById("pwSub").onclick = () => {
            if (document.getElementById("adminPw").value === ADMIN_PASSWORD) { overlay.remove(); onSuccess(); }
            else document.getElementById("pwErr").innerText = "密碼錯誤";
        };
        document.getElementById("pwCan").onclick = () => overlay.remove();
    }

    // ========== 數據操作 ==========
    async function loadAllParticipants() {
        const { data } = await supabase.from('participants').select('name');
        participantsList = data ? data.map(p => p.name) : [];
        const html = participantsList.map(p => `<span class="badge">${p} <button onclick="removeParticipant('${p}')" style="background:none; color:red; margin-left:5px;">×</button></span>`).join('');
        document.getElementById("participantList").innerHTML = html;
        updateSelects("betParticipantSelect", participantsList, "-- 請選擇 --");
        updateSelects("manageParticipantFilter", participantsList, "全部", "all");
        updateSelects("homeParticipantSelect", participantsList, "全部", "all");
    }

    async function loadAllRaceDays() {
        const { data } = await supabase.from('race_days').select('race_date').order('race_date', {ascending: false});
        raceDaysList = data ? data.map(d => d.race_date) : [];
        document.getElementById("raceDateList").innerHTML = raceDaysList.map(d => `<li>📅 ${d} <button onclick="removeRaceDay('${d}')" class="danger" style="padding:2px 8px; font-size:10px;">刪除</button></li>`).join('');
        updateSelects("betRaceDate", raceDaysList);
        updateSelects("manageRaceDateFilter", raceDaysList, "全部", "all");
    }

    function updateSelects(id, list, firstLabel, firstValue) {
        const el = document.getElementById(id);
        if (!el) return;
        let html = firstLabel ? `<option value="${firstValue || ''}">${firstLabel}</option>` : "";
        html += list.map(item => `<option value="${item}">${item}</option>`).join('');
        el.innerHTML = html;
    }

    async function calculateAvailableCapital(participant) {
        const ym = new Date().toISOString().slice(0,7);
        const { data: cap } = await supabase.from('monthly_capital').select('capital_amount').eq('participant', participant).eq('year_month', ym);
        const start = cap?.[0]?.capital_amount || 1000;
        const { data: bets } = await supabase.from('bets').select('amount').eq('participant', participant).ilike('race_date', `${ym}%`);
        const used = bets ? bets.reduce((s, b) => s + b.amount, 0) : 0;
        return start - used;
    }

    async function updateCapitalDisplay(p) {
        const display = document.getElementById("availableCapital");
        if (!p) { display.innerText = "請選擇參賽者"; return; }
        const av = await calculateAvailableCapital(p);
        display.innerText = `$${av}`;
        display.style.color = av < 100 ? "#ff8888" : "white";
    }

    async function refreshHomePage() {
        const { data } = await supabase.from('bets').select('*').order('id', {ascending: false}).limit(20);
        const tbody = document.querySelector("#homeBetTable tbody");
        if (!data || data.length === 0) { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;'>暫無紀錄</td></tr>"; return; }
        tbody.innerHTML = data.map(b => `<tr><td>${b.race_no}</td><td>${b.participant}</td><td>${b.bet_type}</td><td>${b.bet_detail}</td><td>$${b.amount}</td><td>${b.reason || '-'}</td></tr>`).join('');
    }

    async function loadAllBetsForManage() {
        const { data } = await supabase.from('bets').select('*').order('race_date', {ascending: false});
        allBets = data || [];
        const tbody = document.querySelector("#manageBetsTable tbody");
        tbody.innerHTML = allBets.map(b => `
            <tr>
                <td>${b.id}</td><td>${b.participant}</td><td>${b.race_date}</td><td>${b.bet_type}</td><td>$${b.amount}</td>
                <td><button class="win-toggle-btn ${b.is_win ? 'win-true' : 'win-false'}" onclick="toggleWin(${b.id}, ${b.is_win})">${b.is_win ? '已勝' : '未勝'}</button></td>
                <td><button class="danger" onclick="deleteBet(${b.id})">刪除</button></td>
            </tr>`).join('');
    }

    window.toggleWin = async (id, current) => {
        await supabase.from('bets').update({is_win: !current}).eq('id', id);
        loadAllBetsForManage();
    };

    window.deleteBet = async (id) => {
        if (confirm("確定刪除？")) { await supabase.from('bets').delete().eq('id', id); loadAllBetsForManage(); }
    };

    // ========== 初始化與事件 ==========
    function bindEvents() {
        // 投注提交
        document.getElementById("betForm").onsubmit = async (e) => {
            e.preventDefault();
            const p = document.getElementById("betParticipantSelect").value;
            const amt = parseInt(document.getElementById("betAmount").value);
            const av = await calculateAvailableCapital(p);
            if (amt > av) return alert("本金不足！");

            const entry = {
                participant: p,
                race_date: document.getElementById("betRaceDate").value,
                race_no: parseInt(document.getElementById("betRaceNo").value),
                bet_type: document.getElementById("betBetType").value,
                bet_detail: document.getElementById("betDetail").value,
                amount: amt,
                reason: document.getElementById("betReason").value,
                is_win: false
            };
            const { error } = await supabase.from('bets').insert([entry]);
            if (error) alert(error.message);
            else { alert("成功！"); e.target.reset(); updateCapitalDisplay(p); }
        };

        // 參賽者變更更新本金
        document.getElementById("betParticipantSelect").onchange = (e) => updateCapitalDisplay(e.target.value);

        // 玩法變更顯示子玩法
        document.getElementById("betBetType").onchange = (e) => {
            const sub = document.getElementById("subBetTypeGroup");
            sub.style.display = ["二重彩", "三重彩", "四重彩"].includes(e.target.value) ? "block" : "none";
        };

        // 管理按鈕
        document.getElementById("addParticipantBtn").onclick = async () => {
            const name = document.getElementById("newParticipantName").value.trim();
            if (name) { await supabase.from('participants').insert([{name}]); loadAllParticipants(); }
        };

        // 刷新按鈕
        document.getElementById("refreshHomeBtn").onclick = refreshHomePage;
        document.getElementById("refreshManageBtn").onclick = loadAllBetsForManage;
    }

    // 啟動
    window.addEventListener('DOMContentLoaded', async () => {
        // 1. 初始化 Select
        const raceNos = Array.from({length: 12}, (_, i) => i + 1);
        updateSelects("betRaceNo", raceNos);
        updateSelects("homeRaceSelect", raceNos, "全部", "all");

        // 2. 加載數據
        await loadAllParticipants();
        await loadAllRaceDays();

        // 3. 綁定 UI
        setupTabs();
        bindEvents();

        // 4. 預設顯示 Home
        switchPage("home");
    });
</script>

</body>
</html>
