<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬龍虎榜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; color: #2c3e50; }
        .tab-btn.active { background: #1e6f3f; color: white; }
        .page { display: none; }
        .page.active-page { display: block; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; border-left: 5px solid #1e6f3f; padding-left: 16px; }
        .filter-bar { display: flex; gap: 20px; margin-bottom: 20px; background: #f8fafc; padding: 16px; border-radius: 20px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        select, input, textarea, button { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; }
        button { background: #1e6f3f; color: white; border: none; font-weight: 600; cursor: pointer; }
        button.secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
        button.danger { background: #b91c1c; }
        .capital-info { background: linear-gradient(135deg, #1e6f3f, #2a8a4a); color: white; padding: 12px 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .capital-amount { font-size: 1.8rem; font-weight: 700; }
        .stat-cards { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-item { background: #f0f9f4; padding: 16px; border-radius: 20px; flex: 1; min-width: 180px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1e6f3f; }
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .form-row label { width: 100px; font-weight: 600; }
        .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 200px; }
        .inline-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .loading { text-align: center; padding: 40px; color: #1e6f3f; }
        .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box { background: white; padding: 30px; border-radius: 24px; text-align: center; min-width: 300px; }
        .password-box input { width: 100%; margin: 15px 0; }
        .error-msg { color: #b91c1c; font-size: 0.8rem; margin-top: 10px; }
        .badge { background: #e6f7ec; color: #0b5e2e; padding: 4px 10px; border-radius: 30px; display: inline-block; margin: 4px; }
        @media (max-width: 768px) {
            .form-row label { width: 80px; }
            .card { padding: 16px; }
            .capital-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-page="home">🐎 主頁</button>
        <button class="tab-btn" data-page="enter">✍️ 投注</button>
        <button class="tab-btn" data-page="admin">⚙️ 管理</button>
        <button class="tab-btn" data-page="data">📊 每月數據</button>
    </div>

    <div id="home-page" class="page active-page">
        <div class="card">
            <h2>🐎 下個賽日投注表</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>場次</label><select id="homeRaceSelect"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>參賽者</label><select id="homeParticipantSelect"><option value="all">全部</option></select></div>
                <div><button id="refreshHomeBtn">🔄 刷新</button></div>
            </div>
            <div style="overflow-x: auto;"><table id="homeBetTable"><thead>汽<th>場次</th><th>參賽者</th><th>玩法</th><th>投注詳情</th><th>金額</th><th>原因</th></thead><tbody></td><td colspan="6" class="loading">載入中......</td></tbody></div>
        </div>
    </div>

    <div id="enter-page" class="page">
        <div class="card">
            <h2>✍️ 新增投注</h2>
            <div id="capitalDisplay" class="capital-info">
                <span>💰 本月可用本金</span>
                <span class="capital-amount" id="availableCapital">載入中...</span>
            </div>
            <form id="betForm">
                <div class="form-row"><label>參賽者</label><select id="betParticipantSelect" required><option value="">-- 請選擇 --</option></select></div>
                <div class="form-row"><label>賽日</label><select id="betRaceDate"></select></div>
                <div class="form-row"><label>場次</label><select id="betRaceNo"></select></div>
                <div class="form-row"><label>玩法</label><select id="betBetType" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="獨贏">獨贏</option><option value="位置">位置</option><option value="連贏">連贏</option>
                    <option value="位置Q">位置Q</option><option value="二重彩">二重彩</option><option value="三重彩">三重彩</option>
                    <option value="單T">單T</option><option value="四連環">四連環</option><option value="孖寶">孖寶</option>
                    <option value="三寶">三寶</option><option value="過關">過關</option>
                </select></div>
                <div class="form-row"><label>投注詳情</label><input type="text" id="betDetail" required placeholder="例: 1號馬"></div>
                <div class="form-row"><label>金額 ($)</label><input type="number" id="betAmount" required min="10" step="10" value="100"></div>
                <div class="form-row"><label>原因</label><textarea id="betReason" rows="2" placeholder="臨場狀態、檔位、騎師..."></textarea></div>
                <div class="inline-buttons"><button type="submit">💾 儲存</button><button type="button" id="clearBetForm" class="secondary">清除</button></div>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card"><h2>👥 參賽者管理</h2><div class="form-row"><label>新增</label><input type="text" id="newParticipantName" placeholder="姓名"><button id="addParticipantBtn">➕ 加入</button></div><div id="participantList" style="margin-top:20px;"></div></div>
        <div class="card"><h2>📅 賽日管理</h2><div class="form-row"><label>新增賽日</label><input type="date" id="newRaceDate"><button id="addRaceDateBtn">📅 加入</button></div><ul id="raceDateList" style="margin-top:16px;"></ul></div>
    </div>

    <div id="data-page" class="page">
        <div class="card"><h2>📊 每月數據</h2><div class="filter-bar"><div class="filter-group"><label>月份</label><select id="monthSelector"></select></div><button id="refreshDataBtn">📈 計算</button></div><div id="monthlyStatsContainer"></div></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // 設定
    const ADMIN_PASSWORD = "LBadmin";
    const SUPABASE_URL = "https://dmgauesvjpelufjrnlzf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZ2F1ZXN2anBlbHVmanJubHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MTAsImV4cCI6MjA5Mjg2NzkxMH0.IHezXCywHMpKW7t6V9wAXVab-9j8O5Rg2uRu2WvLzk4";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let participantsList = [];
    let raceDaysList = [];
    let adminUnlocked = false;
    const currentYearMonth = new Date().toISOString().slice(0,7);
    
    // 初始化
    window.addEventListener('DOMContentLoaded', async function() {
        await Promise.all([loadParticipants(), loadRaceDays()]);
        await refreshHome();
        await updateSelectors();
        await updateMonthSelector();
        setupEvents();
        setupAdminLock();
        
        // 監聽參賽者選擇變化
        document.getElementById("betParticipantSelect").addEventListener("change", function(e) {
            updateCapitalDisplay(e.target.value);
        });
    });
    
    // 載入參賽者
    async function loadParticipants() {
        const { data, error } = await supabase.from('participants').select('name').order('name');
        if (!error && data) participantsList = data.map(p => p.name);
        renderParticipantList();
        updateParticipantSelectors();
    }
    
    function renderParticipantList() {
        const container = document.getElementById("participantList");
        if (container) {
            container.innerHTML = participantsList.map(p => `<span class="badge">${p} <button onclick="deleteParticipant('${p}')" style="margin-left:8px; background:#b91c1c; padding:2px 8px; border-radius:20px;">刪除</button></span>`).join('');
        }
    }
    
    function updateParticipantSelectors() {
        const betSelect = document.getElementById("betParticipantSelect");
        if (betSelect) {
            betSelect.innerHTML = '<option value="">-- 請選擇 --</option>' + participantsList.map(p => `<option value="${p}">${p}</option>`).join('');
        }
        const homeSelect = document.getElementById("homeParticipantSelect");
        if (homeSelect) {
            homeSelect.innerHTML = '<option value="all">全部參賽者</option>' + participantsList.map(p => `<option value="${p}">${p}</option>`).join('');
        }
    }
    
    window.deleteParticipant = async function(name) {
        if (!confirm("確定刪除此參賽者？")) return;
        await supabase.from('participants').delete().eq('name', name);
        await loadParticipants();
    };
    
    // 載入賽日
    async function loadRaceDays() {
        const { data, error } = await supabase.from('race_days').select('race_date').order('race_date');
        if (!error && data) raceDaysList = data.map(d => d.race_date);
        renderRaceDaysList();
        updateDateSelectors();
    }
    
    function renderRaceDaysList() {
        const container = document.getElementById("raceDateList");
        if (container) {
            container.innerHTML = raceDaysList.map(d => `<li>📅 ${d} <button onclick="deleteRaceDay('${d}')" class="secondary" style="margin-left:12px;">刪除</button></li>`).join('');
        }
    }
    
    function updateDateSelectors() {
        const betDateSelect = document.getElementById("betRaceDate");
        if (betDateSelect) {
            betDateSelect.innerHTML = raceDaysList.map(d => `<option value="${d}">${d}</option>`).join('');
            const today = new Date().toISOString().slice(0,10);
            let nextDay = raceDaysList.find(d => d >= today) || raceDaysList[0];
            if (nextDay) betDateSelect.value = nextDay;
        }
    }
    
    window.deleteRaceDay = async function(date) {
        if (!confirm("確定刪除此賽日？")) return;
        await supabase.from('race_days').delete().eq('race_date', date);
        await loadRaceDays();
    };
    
    // 獲取下個賽日
    async function getNextRaceDay() {
        const today = new Date().toISOString().slice(0,10);
        let next = raceDaysList.find(d => d >= today);
        return next || raceDaysList[0] || today;
    }
    
    // 刷新主頁
    async function refreshHome() {
        const raceFilter = document.getElementById("homeRaceSelect").value;
        const personFilter = document.getElementById("homeParticipantSelect").value;
        const targetDay = await getNextRaceDay();
        
        const { data, error } = await supabase.from('bets').select('*').eq('race_date', targetDay);
        if (error) { console.error(error); return; }
        
        let filtered = data || [];
        if (raceFilter !== 'all') filtered = filtered.filter(b => b.race_no == raceFilter);
        if (personFilter !== 'all') filtered = filtered.filter(b => b.participant === personFilter);
        
        const tbody = document.querySelector("#homeBetTable tbody");
        if (filtered.length === 0) {
            tbody.innerHTML = "<tr><td colspan='6'>暫無投注紀錄</td></tr>";
            return;
        }
        tbody.innerHTML = filtered.map(b => `
            <tr>
                <td>第 ${b.race_no} 場</td>
                <td>${b.participant}</td>
                <td>${b.bet_type || '-'}</td>
                <td>${b.bet_detail}</td>
                <td>$${b.amount}</td>
                <td>${b.reason || '-'}</td>
            </tr>
        `).join('');
    }
    
    // 更新下拉選單
    async function updateSelectors() {
        const raceOptions = '<option value="all">全部場次</option>' + Array.from({length:12}, (_,i) => `<option value="${i+1}">第 ${i+1} 場</option>`).join('');
        const homeSelect = document.getElementById("homeRaceSelect");
        if (homeSelect) homeSelect.innerHTML = raceOptions;
        const betRaceNo = document.getElementById("betRaceNo");
        if (betRaceNo) betRaceNo.innerHTML = Array.from({length:12}, (_,i) => `<option value="${i+1}">第 ${i+1} 場</option>`).join('');
    }
    
    // 計算可用本金
    async function calculateAvailableCapital(participant) {
        if (!participant) return 0;
        const { data: capitalData } = await supabase.from('monthly_capital').select('capital_amount').eq('participant', participant).eq('year_month', currentYearMonth);
        const startCapital = (capitalData && capitalData[0]) ? capitalData[0].capital_amount : 1000;
        const { data: betsData } = await supabase.from('bets').select('amount').eq('participant', participant).ilike('race_date', `${currentYearMonth}%`);
        const totalStaked = betsData ? betsData.reduce((sum, b) => sum + b.amount, 0) : 0;
        return startCapital - totalStaked;
    }
    
    async function updateCapitalDisplay(participant) {
        const available = await calculateAvailableCapital(participant);
        const display = document.getElementById("availableCapital");
        if (display) display.innerText = `$${available}`;
        return available;
    }
    
    // 每月數據
    async function updateMonthSelector() {
        const { data } = await supabase.from('bets').select('race_date');
        if (!data) return;
        let months = [...new Set(data.map(b => b.race_date?.slice(0,7)))].filter(m => m).sort().reverse();
        let selector = document.getElementById("monthSelector");
        if (selector) selector.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
        if (months.length) await showMonthlyStats(months[0]);
    }
    
    async function showMonthlyStats(month) {
        const { data } = await supabase.from('bets').select('*').ilike('race_date', `${month}%`);
        if (!data || !data.length) {
            document.getElementById("monthlyStatsContainer").innerHTML = "<div>無資料</div>";
            return;
        }
        let stats = new Map();
        data.forEach(b => {
            if (!stats.has(b.participant)) stats.set(b.participant, { stake: 0, profit: 0, winCount: 0, total: 0 });
            let s = stats.get(b.participant);
            s.total++;
            s.stake += b.amount;
            if (b.is_win) { s.profit += b.amount; s.winCount++; }
            else s.profit -= b.amount;
        });
        let html = '<div class="stat-cards">';
        for (let [name, s] of stats) {
            let winRate = s.total ? (s.winCount / s.total * 100).toFixed(1) : 0;
            let roi = s.stake ? (s.profit / s.stake * 100).toFixed(1) : 0;
            html += `<div class="stat-item">
                <div class="stat-label">${name}</div>
                <div class="stat-value">${winRate}%</div>
                <div>勝率</div>
                <div>回報率 ${roi}%</div>
                <div>總投注:$${s.stake} | 淨利:$${s.profit}</div>
            </div>`;
        }
        html += '</div>';
        document.getElementById("monthlyStatsContainer").innerHTML = html;
    }
    
    // 管理員密碼鎖
    function setupAdminLock() {
        if (sessionStorage.getItem("adminUnlocked") === "true") return;
        
        const adminTab = document.querySelector('.tab-btn[data-page="admin"]');
        if (!adminTab) return;
        
        adminTab.onclick = (e) => {
            e.preventDefault();
            if (sessionStorage.getItem("adminUnlocked") === "true") {
                switchToAdmin();
                return;
            }
            showPasswordModal(() => {
                sessionStorage.setItem("adminUnlocked", "true");
                switchToAdmin();
            });
        };
        
        function switchToAdmin() {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            adminTab.classList.add("active");
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
            document.getElementById("admin-page").classList.add("active-page");
            loadParticipants();
            loadRaceDays();
        }
    }
    
    function showPasswordModal(onSuccess) {
        const overlay = document.createElement("div");
        overlay.className = "password-overlay";
        overlay.innerHTML = `
            <div class="password-box">
                <h3>🔐 管理員驗證</h3>
                <p>請輸入密碼</p>
                <input type="password" id="adminPasswordInput">
                <div id="passwordError" class="error-msg"></div>
                <button id="submitPasswordBtn">確認</button>
                <button id="cancelPasswordBtn" class="secondary">取消</button>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById("submitPasswordBtn").onclick = () => {
            if (document.getElementById("adminPasswordInput").value === ADMIN_PASSWORD) {
                overlay.remove();
                onSuccess();
            } else {
                document.getElementById("passwordError").innerText = "密碼錯誤";
            }
        };
        document.getElementById("cancelPasswordBtn").onclick = () => overlay.remove();
    }
    
    // 事件綁定
    function setupEvents() {
        document.getElementById("refreshHomeBtn").onclick = refreshHome;
        document.getElementById("refreshDataBtn").onclick = () => showMonthlyStats(document.getElementById("monthSelector").value);
        document.getElementById("clearBetForm").onclick = () => document.getElementById("betForm").reset();
        
        document.getElementById("addParticipantBtn").onclick = async () => {
            const name = document.getElementById("newParticipantName").value.trim();
            if (name && !participantsList.includes(name)) {
                await supabase.from('participants').insert([{ name }]);
                await loadParticipants();
                document.getElementById("newParticipantName").value = "";
            }
        };
        
        document.getElementById("addRaceDateBtn").onclick = async () => {
            const date = document.getElementById("newRaceDate").value;
            if (date && !raceDaysList.includes(date)) {
                await supabase.from('race_days').insert([{ race_date: date }]);
                await loadRaceDays();
            }
        };
        
        document.getElementById("betForm").onsubmit = async (e) => {
            e.preventDefault();
            const participant = document.getElementById("betParticipantSelect").value;
            if (!participant) return alert("請選擇參賽者");
            
            const available = await calculateAvailableCapital(participant);
            const amount = parseInt(document.getElementById("betAmount").value);
            if (amount > available) return alert(`可用本金不足！本月剩餘 $${available}`);
            
            const raceDate = document.getElementById("betRaceDate").value;
            const raceNo = parseInt(document.getElementById("betRaceNo").value);
            const betType = document.getElementById("betBetType").value;
            if (!betType) return alert("請選擇玩法");
            const detail = document.getElementById("betDetail").value.trim();
            const reason = document.getElementById("betReason").value;
            if (!raceDate || !detail) return alert("請完整填寫");
            
            const { error } = await supabase.from('bets').insert([{
                participant, race_date: raceDate, race_no: raceNo,
                bet_type: betType, bet_detail: detail, amount, reason, is_win: false
            }]);
            
            if (error) alert("儲存失敗: " + error.message);
            else {
                alert("投注成功");
                e.target.reset();
                await refreshHome();
                await updateMonthSelector();
                await updateCapitalDisplay(participant);
            }
        };
        
        // 其他頁籤切換
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const pageName = btn.dataset.page;
            if (pageName !== 'admin') {
                btn.onclick = () => {
                    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                    btn.classList.add("active");
                    document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
                    document.getElementById(`${pageName}-page`).classList.add("active-page");
                    if (pageName === "data") updateMonthSelector();
                    if (pageName === "home") refreshHome();
                };
            }
        });
    }
</script>
</body>
</html>
