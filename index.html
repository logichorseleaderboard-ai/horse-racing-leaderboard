<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬龍虎榜 - 雲端同步版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #f4f7fc; color: #1e2a3a; padding: 24px 20px 50px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; font-size: 1.1rem; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; transition: 0.2s; color: #2c3e50; }
        .tab-btn.active { background: #1e6f3f; color: white; }
        .tab-btn:not(.active):hover { background: #e2e8f0; }
        .page { display: none; animation: fade 0.2s ease; }
        .page.active-page { display: block; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
        .card { background: white; border-radius: 24px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); padding: 24px 28px; margin-bottom: 30px; }
        h2 { font-size: 1.5rem; margin-bottom: 1rem; font-weight: 600; border-left: 5px solid #1e6f3f; padding-left: 16px; }
        h3 { font-size: 1.2rem; margin-bottom: 16px; color: #0f3b2c; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; margin-bottom: 28px; background: #f8fafc; padding: 16px 20px; border-radius: 20px; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        select, input, textarea, button { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; }
        button { background: #1e6f3f; color: white; border: none; font-weight: 600; cursor: pointer; }
        button.secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; font-size: 0.85rem; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; color: #0c4a2e; }
        .badge { background: #e6f7ec; color: #0b5e2e; padding: 4px 10px; border-radius: 30px; font-size: 0.75rem; }
        .stat-cards { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 20px; }
        .stat-item { background: #f0f9f4; padding: 16px; border-radius: 20px; flex: 1; min-width: 180px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1e6f3f; }
        .form-row { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; align-items: center; }
        .form-row label { width: 100px; font-weight: 600; }
        .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 200px; }
        .inline-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .info-note { font-size: 0.75rem; color: #5b6e8c; margin-top: 12px; }
        .loading { text-align: center; padding: 40px; color: #1e6f3f; }
        @media (max-width: 768px) { .card { padding: 16px; } .filter-bar { flex-direction: column; } }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-page="home">🐎 主頁・下個賽日</button>
        <button class="tab-btn" data-page="enter">✍️ 參賽者投注</button>
        <button class="tab-btn" data-page="admin">⚙️ 管理</button>
        <button class="tab-btn" data-page="data">📊 每月數據</button>
    </div>

    <div id="home-page" class="page active-page">
        <div class="card">
            <h2>🐎 下個賽日投注表</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>場次</label><select id="homeRaceSelect"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>參賽者</label><select id="homeParticipantSelect"><option value="all">全部</option></select></div>
                <div><button id="refreshHomeBtn">🔄 刷新</button></div>
            </div>
            <div style="overflow-x: auto;"><table id="homeBetTable"><thead><tr><th>場次</th><th>參賽者</th><th>投注詳情</th><th>金額</th><th>原因</th></tr></thead><tbody><tr><td colspan="5" class="loading">載入中...</td></tr></tbody></table></div>
        </div>
    </div>

    <div id="enter-page" class="page">
        <div class="card">
            <h2>✍️ 新增投注</h2>
            <form id="betForm">
                <div class="form-row"><label>參賽者</label><input type="text" id="betParticipant" required placeholder="姓名"></div>
                <div class="form-row"><label>賽日</label><select id="betRaceDate"></select></div>
                <div class="form-row"><label>場次</label><select id="betRaceNo"></select></div>
                <div class="form-row"><label>投注詳情</label><input type="text" id="betDetail" required placeholder="例: 獨贏 1號馬"></div>
                <div class="form-row"><label>金額 ($)</label><input type="number" id="betAmount" required min="10" step="10" value="100"></div>
                <div class="form-row"><label>原因</label><textarea id="betReason" rows="2"></textarea></div>
                <div class="inline-buttons"><button type="submit">💾 儲存</button><button type="button" id="clearBetForm" class="secondary">清除</button></div>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="card"><h2>👥 參賽者管理</h2><div class="form-row"><label>新增參賽者</label><input type="text" id="newParticipantName" placeholder="姓名"><button id="addParticipantBtn">➕ 加入</button></div><div id="participantList" style="margin-top:20px; display:flex; flex-wrap:wrap; gap:8px;"></div></div>
        <div class="card"><h2>📅 賽日管理</h2><div class="form-row"><label>新增賽日</label><input type="date" id="newRaceDate"><button id="addRaceDateBtn">📅 加入</button></div><ul id="raceDateList" style="margin-top:16px;"></ul></div>
    </div>

    <div id="data-page" class="page">
        <div class="card"><h2>📊 每月數據</h2><div class="filter-bar"><div class="filter-group"><label>選擇月份</label><select id="monthSelector"></select></div><button id="refreshDataBtn">📈 計算</button></div><div id="monthlyStatsContainer"></div></div>
    </div>
</div>

<script>
    // ========== 請在這裡填入你的 Supabase 資訊 ==========
    const SUPABASE_URL = "https://dmgauesvjpelufjrnlzf.supabase.co";      // 替換成你的 Project URL
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZ2F1ZXN2anBlbHVmanJubHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MTAsImV4cCI6MjA5Mjg2NzkxMH0.IHezXCywHMpKW7t6V9wAXVab-9j8O5Rg2uRu2WvLzk4";               // 替換成你的 anon public key
    // =================================================
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // 全域資料
    let participants = [];
    let raceDates = [];
    
    // 初始化
    async function init() {
        await loadParticipants();
        await loadRaceDates();
        await loadAndDisplayHome();
        setupEventListeners();
        populateRaceSelectors();
        await updateMonthSelector();
    }
    
    async function loadParticipants() {
        const { data, error } = await supabase.from('participants').select('name').order('name');
        if (!error && data) participants = data.map(p => p.name);
        else console.error(error);
        renderParticipantList();
    }
    
    async function loadRaceDates() {
        const { data, error } = await supabase.from('race_days').select('race_date').order('race_date');
        if (!error && data) raceDates = data.map(d => d.race_date);
        else console.error(error);
        renderRaceDateList();
    }
    
    async function getNextRaceDay() {
        const today = new Date().toISOString().slice(0,10);
        const future = raceDates.filter(d => d >= today).sort();
        return future.length ? future[0] : (raceDates[0] || today);
    }
    
    async function loadAndDisplayHome() {
        const raceFilter = document.getElementById("homeRaceSelect").value;
        const participantFilter = document.getElementById("homeParticipantSelect").value;
        const nextDay = await getNextRaceDay();
        let query = supabase.from('bets').select('*').eq('race_date', nextDay);
        const { data, error } = await query;
        if (error) { console.error(error); return; }
        let filtered = data || [];
        if (raceFilter !== 'all') filtered = filtered.filter(b => b.race_no == raceFilter);
        if (participantFilter !== 'all') filtered = filtered.filter(b => b.participant === participantFilter);
        const tbody = document.querySelector("#homeBetTable tbody");
        if (filtered.length === 0) { tbody.innerHTML = "<tr><td colspan='5'>暫無投注紀錄</td></tr>"; return; }
        tbody.innerHTML = filtered.map(b => `<tr><td>第 ${b.race_no} 場</td><td>${b.participant}</td><td>${b.bet_detail}</td><td>$${b.amount}</td><td>${b.reason || '-'}</td></tr>`).join('');
    }
    
    async function addBet(bet) {
        const { error } = await supabase.from('bets').insert([bet]);
        if (error) { alert("儲存失敗: " + error.message); return false; }
        return true;
    }
    
    async function addParticipant(name) {
        const { error } = await supabase.from('participants').insert([{ name }]);
        if (error) alert("加入失敗: " + error.message);
        else await loadParticipants();
    }
    
    async function addRaceDate(date) {
        const { error } = await supabase.from('race_days').insert([{ race_date: date }]);
        if (error) alert("新增賽日失敗: " + error.message);
        else await loadRaceDates();
    }
    
    async function deleteParticipant(name) {
        const { error } = await supabase.from('participants').delete().eq('name', name);
        if (error) alert("刪除失敗");
        else await loadParticipants();
    }
    
    async function deleteRaceDate(date) {
        const { error } = await supabase.from('race_days').delete().eq('race_date', date);
        if (error) alert("刪除失敗");
        else await loadRaceDates();
    }
    
    function renderParticipantList() {
        const container = document.getElementById("participantList");
        if (!container) return;
        container.innerHTML = participants.map(p => `<span class="badge" style="background:#e2e8f0; padding:6px 12px;">${p} <i class="fas fa-trash-alt" style="cursor:pointer; margin-left:8px; color:#b91c1c;" data-name="${p}"></i></span>`).join('');
        document.querySelectorAll("[data-name]").forEach(el => {
            el.addEventListener("click", (e) => { if(confirm("刪除?")) deleteParticipant(el.getAttribute("data-name")); });
        });
    }
    
    function renderRaceDateList() {
        const ul = document.getElementById("raceDateList");
        if (!ul) return;
        ul.innerHTML = raceDates.map(d => `<li style="margin-bottom:8px;">📅 ${d} <button class="secondary" style="margin-left:12px; padding:2px 10px;" data-date="${d}">刪除</button></li>`).join('');
        document.querySelectorAll("[data-date]").forEach(btn => {
            btn.addEventListener("click", () => deleteRaceDate(btn.getAttribute("data-date")));
        });
    }
    
    function populateRaceSelectors() {
        const raceNos = '<option value="all">全部場次</option>' + Array.from({length:12}, (_,i) => `<option value="${i+1}">第 ${i+1} 場</option>`).join('');
        document.getElementById("homeRaceSelect").innerHTML = raceNos;
        document.getElementById("betRaceNo").innerHTML = raceNos.replace('value="all"', 'value="1"');
        const partSelect = document.getElementById("homeParticipantSelect");
        partSelect.innerHTML = '<option value="all">全部參賽者</option>' + participants.map(p => `<option value="${p}">${p}</option>`).join('');
        const dateSelect = document.getElementById("betRaceDate");
        dateSelect.innerHTML = raceDates.map(d => `<option value="${d}">${d}</option>`).join('');
        if(raceDates.length) getNextRaceDay().then(day => { if(day) dateSelect.value = day; });
    }
    
    async function updateMonthSelector() {
        const { data } = await supabase.from('bets').select('race_date');
        if (!data) return;
        const months = [...new Set(data.map(b => b.race_date.slice(0,7)))].sort().reverse();
        const sel = document.getElementById("monthSelector");
        if(sel) sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
        if(months.length) await renderMonthlyStats(months[0]);
    }
    
    async function renderMonthlyStats(month) {
        if(!month) return;
        const { data } = await supabase.from('bets').select('*').ilike('race_date', `${month}%`);
        if (!data || data.length===0) { document.getElementById("monthlyStatsContainer").innerHTML = "<div>無投注紀錄</div>"; return; }
        const stats = new Map();
        data.forEach(bet => {
            if(!stats.has(bet.participant)) stats.set(bet.participant, { totalStake:0, totalProfit:0, winBets:0, totalBets:0 });
            const s = stats.get(bet.participant);
            s.totalBets++;
            s.totalStake += bet.amount;
            if(bet.is_win) { s.totalProfit += bet.amount; s.winBets++; }
            else s.totalProfit -= bet.amount;
        });
        let html = '<div class="stat-cards">';
        for(let [name, s] of stats.entries()) {
            const winRate = s.totalBets ? (s.winBets/s.totalBets*100).toFixed(1) : 0;
            const roi = s.totalStake ? (s.totalProfit/s.totalStake*100).toFixed(1) : 0;
            html += `<div class="stat-item"><div class="stat-label">${name}</div><div class="stat-value">${winRate}%</div><div>勝率</div><div>回報率 ${roi}%</div><div style="font-size:0.7rem;">投注額:$${s.totalStake} | 淨利:$${s.totalProfit}</div></div>`;
        }
        html += '</div>';
        document.getElementById("monthlyStatsContainer").innerHTML = html;
    }
    
    function setupEventListeners() {
        document.getElementById("refreshHomeBtn")?.addEventListener("click", loadAndDisplayHome);
        document.getElementById("betForm")?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const participant = document.getElementById("betParticipant").value.trim();
            if(!participant) return alert("請輸入參賽者");
            const raceDate = document.getElementById("betRaceDate").value;
            const race_no = parseInt(document.getElementById("betRaceNo").value);
            const bet_detail = document.getElementById("betDetail").value.trim();
            const amount = parseInt(document.getElementById("betAmount").value);
            const reason = document.getElementById("betReason").value;
            if(!raceDate || !bet_detail || isNaN(amount)) return alert("請完整填寫");
            const success = await addBet({ participant, race_date: raceDate, race_no, bet_detail, amount, reason, is_win: false });
            if(success) { alert("投注成功"); e.target.reset(); await loadAndDisplayHome(); await updateMonthSelector(); }
        });
        document.getElementById("addParticipantBtn")?.addEventListener("click", async () => {
            const name = document.getElementById("newParticipantName").value.trim();
            if(name && !participants.includes(name)) { await addParticipant(name); document.getElementById("newParticipantName").value=""; await populateRaceSelectors(); }
        });
        document.getElementById("addRaceDateBtn")?.addEventListener("click", async () => {
            const date = document.getElementById("newRaceDate").value;
            if(date && !raceDates.includes(date)) { await addRaceDate(date); await populateRaceSelectors(); }
        });
        document.getElementById("refreshDataBtn")?.addEventListener("click", () => renderMonthlyStats(document.getElementById("monthSelector").value));
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
                document.getElementById(`${btn.dataset.page}-page`).classList.add("active-page");
                if(btn.dataset.page === "data") updateMonthSelector();
                if(btn.dataset.page === "home") loadAndDisplayHome();
                if(btn.dataset.page === "admin") { loadParticipants(); loadRaceDates(); }
            });
        });
        document.getElementById("clearBetForm")?.addEventListener("click", () => document.getElementById("betForm").reset());
    }
    
    init();
</script>
</body>
</html>
