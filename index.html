<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽馬龍虎榜 - 每月$1000</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        body { background: #f4f7fc; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; border-bottom: 2px solid #cbd5e1; padding-bottom: 6px; flex-wrap: wrap; }
        .tab-btn { background: transparent; border: none; font-size: 1rem; font-weight: 600; padding: 8px 20px; border-radius: 40px; cursor: pointer; color: #2c3e50; }
        .tab-btn.active { background: #1e6f3f; color: white; }
        .page { display: none; }
        .page.active-page { display: block; }
        .card { background: white; border-radius: 24px; padding: 24px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { font-size: 1.4rem; margin-bottom: 1rem; border-left: 5px solid #1e6f3f; padding-left: 16px; }
        h3 { font-size: 1.1rem; margin: 20px 0 12px 0; color: #1e6f3f; }
        .filter-bar { display: flex; gap: 20px; margin-bottom: 20px; background: #f8fafc; padding: 16px; border-radius: 20px; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; }
        select, input, textarea, button { border: 1px solid #cbd5e1; border-radius: 14px; padding: 10px 14px; font-size: 0.9rem; }
        button { background: #1e6f3f; color: white; border: none; font-weight: 600; cursor: pointer; }
        button.secondary { background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1; }
        button.danger { background: #b91c1c; }
        button.small { padding: 4px 10px; font-size: 0.75rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; overflow-x: auto; display: block; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f1f5f9; }
        .badge { background: #e6f7ec; color: #0b5e2e; padding: 4px 10px; border-radius: 30px; display: inline-block; margin: 4px; }
        .capital-info { background: linear-gradient(135deg, #1e6f3f, #2a8a4a); color: white; padding: 12px 20px; border-radius: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .capital-amount { font-size: 1.8rem; font-weight: 700; }
        .capital-warning { background: #fee2e2; color: #b91c1c; padding: 8px 16px; border-radius: 16px; }
        .stat-cards { display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-item { background: #f0f9f4; padding: 16px; border-radius: 20px; flex: 1; min-width: 180px; }
        .stat-value { font-size: 1.8rem; font-weight: 700; color: #1e6f3f; }
        .form-row { display: flex; gap: 16px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
        .form-row label { width: 100px; font-weight: 600; }
        .form-row input, .form-row select, .form-row textarea { flex: 1; min-width: 200px; }
        .inline-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .loading { text-align: center; padding: 40px; color: #1e6f3f; }
        .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .password-box { background: white; padding: 30px; border-radius: 24px; text-align: center; min-width: 300px; }
        .password-box input { width: 100%; margin: 15px 0; }
        .error-msg { color: #b91c1c; font-size: 0.8rem; margin-top: 10px; }
        .sub-bet-type-group { display: none; background: #f8fafc; padding: 12px 16px; border-radius: 16px; margin-left: 116px; }
        @media (max-width: 768px) {
            .form-row label { width: 80px; }
            .card { padding: 16px; }
            .sub-bet-type-group { margin-left: 0; }
            .capital-info { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="tabs">
        <button class="tab-btn active" data-page="home">🐎 主頁</button>
        <button class="tab-btn" data-page="enter">✍️ 投注</button>
        <button class="tab-btn" data-page="admin">⚙️ 管理</button>
        <button class="tab-btn" data-page="bets-manage">📋 投注紀錄</button>
        <button class="tab-btn" data-page="data">📊 每月數據</button>
    </div>

    <div id="home-page" class="page active-page">
        <div class="card">
            <h2>🐎 下個賽日投注表</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>場次</label><select id="homeRaceSelect"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>參賽者</label><select id="homeParticipantSelect"><option value="all">全部</option></select></div>
                <div><button id="refreshHomeBtn">🔄 刷新</button></div>
            </div>
            <div style="overflow-x: auto;"><table id="homeBetTable"><thead>汽<th>場次</th><th>參賽者</th><th>玩法</th><th>投注詳情</th><th>金額</th><th>原因</th></thead><tbody><tr><td colspan="6" class="loading">載入中...</td></tr></tbody></div>
        </div>
    </div>

    <div id="enter-page" class="page">
        <div class="card">
            <h2>✍️ 新增投注</h2>
            <div id="capitalDisplay" class="capital-info">
                <span>💰 本月可用本金</span>
                <span class="capital-amount" id="availableCapital">載入中...</span>
            </div>
            <form id="betForm">
                <div class="form-row"><label>參賽者</label><select id="betParticipantSelect" required><option value="">-- 請選擇 --</option></select></div>
                <div class="form-row"><label>賽日</label><select id="betRaceDate"></select></div>
                <div class="form-row"><label>場次</label><select id="betRaceNo"></select></div>
                <div class="form-row"><label>玩法</label><select id="betBetType" required>
                    <option value="">-- 請選擇 --</option>
                    <option value="獨贏">獨贏</option><option value="位置">位置</option><option value="連贏">連贏</option>
                    <option value="位置Q">位置Q</option><option value="連贏及位置Q">連贏及位置Q</option>
                    <option value="二重彩">二重彩</option><option value="三重彩">三重彩</option><option value="單T">單T</option>
                    <option value="四連環">四連環</option><option value="四重彩">四重彩</option>
                    <option value="孖寶">孖寶</option><option value="三寶">三寶</option><option value="孖T">孖T</option>
                    <option value="三T">三T</option><option value="六環彩">六環彩</option><option value="過關">過關</option>
                </select></div>
                <div id="subBetTypeGroup" class="sub-bet-type-group">
                    <label>子玩法</label>
                    <select id="betSubType"><option value="">-- 請選擇 --</option>
                        <option value="單式">單式</option><option value="複式">複式</option>
                        <option value="單式馬膽">單式馬膽</option><option value="複式馬膽">複式馬膽</option>
                        <option value="指定位置馬膽">指定位置馬膽</option>
                    </select>
                </div>
                <div class="form-row"><label>投注詳情</label><input type="text" id="betDetail" required placeholder="例: 1號馬"></div>
                <div class="form-row"><label>金額 ($)</label><input type="number" id="betAmount" required min="10" step="10" value="100"></div>
                <div class="form-row"><label>原因</label><textarea id="betReason" rows="2" placeholder="臨場狀態、檔位、騎師..."></textarea></div>
                <div class="inline-buttons"><button type="submit">💾 儲存</button><button type="button" id="clearBetForm" class="secondary">清除</button></div>
            </form>
        </div>
    </div>

    <div id="admin-page" class="page">
        <div class="admin-content">
            <div class="card"><h2>👥 參賽者管理</h2><div class="form-row"><label>新增</label><input type="text" id="newParticipantName" placeholder="姓名"><button id="addParticipantBtn">➕ 加入</button></div><div id="participantList" style="margin-top:20px;"></div></div>
            <div class="card"><h2>📅 賽日管理</h2><div class="form-row"><label>新增賽日</label><input type="date" id="newRaceDate"><button id="addRaceDateBtn">📅 加入</button></div><ul id="raceDateList" style="margin-top:16px;"></ul></div>
        </div>
    </div>

    <div id="bets-manage-page" class="page">
        <div class="card">
            <h2>📋 管理投注紀錄</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>參賽者</label><select id="manageParticipantFilter"><option value="all">全部</option></select></div>
                <div class="filter-group"><label>賽日</label><select id="manageRaceDateFilter"><option value="all">全部</option></select></div>
                <div><button id="refreshManageBtn" class="secondary">🔄 刷新</button></div>
            </div>
            <div style="overflow-x: auto;"><table id="manageBetsTable"><thead>汽<th>ID</th><th>參賽者</th><th>賽日</th><th>場次</th><th>玩法</th><th>詳情</th><th>金額</th><th>操作</th></thead><tbody><tr><td colspan="8" class="loading">載入中...</td></tr></tbody></div>
        </div>
    </div>

    <div id="data-page" class="page">
        <div class="card">
            <h2>📊 每月數據</h2>
            <div class="filter-bar">
                <div class="filter-group"><label>月份</label><select id="monthSelector"></select></div>
                <button id="refreshDataBtn">📈 計算</button>
            </div>
            <div id="monthlyStatsContainer"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const ADMIN_PASSWORD = "LBadmin";
    const MY_SB_URL = "https://dmgauesvjpelufjrnlzf.supabase.co";
    const MY_SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRtZ2F1ZXN2anBlbHVmanJubHpmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcyOTE5MTAsImV4cCI6MjA5Mjg2NzkxMH0.IHezXCywHMpKW7t6V9wAXVab-9j8O5Rg2uRu2WvLzk4";
    
    const sbClient = window.supabase.createClient(MY_SB_URL, MY_SB_KEY);
    
    let participantsList = [];
    let raceDaysList = [];
    let allBets = [];
    let currentParticipantCapital = {};
    const currentYearMonth = getCurrentYearMonth();
    
    function getCurrentYearMonth() { return new Date().toISOString().slice(0,7); }
    
    // 確保每月本金存在（自動為所有參賽者建立當月$1000）
    async function ensureMonthlyCapital() {
        if (!participantsList.length) return;
        for (const p of participantsList) {
            const { data, error } = await sbClient.from('monthly_capital').select('*').eq('participant', p).eq('year_month', currentYearMonth);
            if (!error && (!data || data.length === 0)) {
                await sbClient.from('monthly_capital').insert([{ participant: p, year_month: currentYearMonth, capital_amount: 1000 }]);
                console.log(`為 ${p} 建立 ${currentYearMonth} 本金 $1000`);
            }
        }
    }
    
    // 計算某參賽者當月可用本金 = 起始本金 - 當月總投注金額
    async function calculateAvailableCapital(participant) {
        const { data: capitalData } = await sbClient.from('monthly_capital').select('capital_amount').eq('participant', participant).eq('year_month', currentYearMonth);
        const startCapital = (capitalData && capitalData[0]) ? capitalData[0].capital_amount : 1000;
        const { data: betsData } = await sbClient.from('bets').select('amount').eq('participant', participant).ilike('race_date', `${currentYearMonth}%`);
        const totalStaked = betsData ? betsData.reduce((sum, b) => sum + b.amount, 0) : 0;
        return startCapital - totalStaked;
    }
    
    async function updateCapitalDisplay(participant) {
        if (!participant) { document.getElementById("availableCapital").innerText = "請選擇參賽者"; return; }
        const available = await calculateAvailableCapital(participant);
        const display = document.getElementById("availableCapital");
        if (display) {
            display.innerText = `$${available}`;
            if (available < 100) display.style.color = "#ffcccc";
            else display.style.color = "white";
        }
        return available;
    }
    
    window.addEventListener('DOMContentLoaded', async function() {
        await loadAllParticipants();
        await ensureMonthlyCapital();
        await loadAllRaceDays();
        await refreshHomePage();
        await refreshSelectors();
        await refreshMonthSelector();
        await loadAllBetsForManage();
        bindEvents();
        setupAdminLock();
        setupSubBetTypeListener();
        document.getElementById("betParticipantSelect").addEventListener("change", (e) => updateCapitalDisplay(e.target.value));
    });
    
    function setupSubBetTypeListener() {
        const betTypeSelect = document.getElementById("betBetType");
        const subGroup = document.getElementById("subBetTypeGroup");
        if(betTypeSelect) {
            betTypeSelect.addEventListener("change", function() {
                const types = ["二重彩", "三重彩", "四重彩"];
                if (types.includes(this.value)) subGroup.style.display = "block";
                else subGroup.style.display = "none";
            });
        }
    }
    
    function setupAdminLock() {
        if (sessionStorage.getItem("adminUnlocked") === "true") return;
        const adminTab = document.querySelector('.tab-btn[data-page="admin"]');
        const manageTab = document.querySelector('.tab-btn[data-page="bets-manage"]');
        const protectTab = (tab, pageId) => {
            if(!tab) return;
            tab.onclick = (e) => {
                e.preventDefault();
                if (sessionStorage.getItem("adminUnlocked") === "true") {
                    switchPage(tab, pageId);
                    return;
                }
                showPasswordModal(() => {
                    sessionStorage.setItem("adminUnlocked", "true");
                    switchPage(tab, pageId);
                });
            };
        };
        const switchPage = (tab, pageId) => {
            document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
            tab.classList.add("active");
            document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
            document.getElementById(pageId).classList.add("active-page");
            if(pageId === "bets-manage-page") loadAllBetsForManage();
            if(pageId === "admin-page") { loadAllParticipants(); loadAllRaceDays(); }
        };
        protectTab(adminTab, "admin-page");
        protectTab(manageTab, "bets-manage-page");
        document.querySelectorAll('.tab-btn:not([data-page="admin"]):not([data-page="bets-manage"])').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                document.querySelectorAll(".page").forEach(p => p.classList.remove("active-page"));
                document.getElementById(`${btn.dataset.page}-page`).classList.add("active-page");
                if (btn.dataset.page === "data") refreshMonthSelector();
                if (btn.dataset.page === "home") refreshHomePage();
            };
        });
    }
    
    function showPasswordModal(onSuccess) {
        const existingOverlay = document.querySelector(".password-overlay");
        if (existingOverlay) existingOverlay.remove();
        const overlay = document.createElement("div");
        overlay.className = "password-overlay";
        overlay.innerHTML = `<div class="password-box"><h3>🔐 管理員驗證</h3><p>請輸入密碼</p><input type="password" id="adminPasswordInput"><div id="passwordError" class="error-msg"></div><button id="submitPasswordBtn">確認</button><button id="cancelPasswordBtn" class="secondary">取消</button></div>`;
        document.body.appendChild(overlay);
        document.getElementById("submitPasswordBtn").onclick = () => {
            if (document.getElementById("adminPasswordInput").value === ADMIN_PASSWORD) { overlay.remove(); if(onSuccess) onSuccess(); }
            else document.getElementById("passwordError").innerText = "密碼錯誤";
        };
        document.getElementById("cancelPasswordBtn").onclick = () => overlay.remove();
        document.getElementById("adminPasswordInput").onkeypress = (e) => { if (e.key === "Enter") document.getElementById("submitPasswordBtn").click(); };
    }
    
    async function loadAllParticipants() {
        const { data, error } = await sbClient.from('participants').select('name');
        if (!error && data) participantsList = data.map(p => p.name);
        document.getElementById("participantList").innerHTML = participantsList.map(p => `<span class="badge">${p} <button onclick="removeParticipant('${p}')">刪除</button></span>`).join('');
        const selectors = ["betParticipantSelect", "manageParticipantFilter"];
        selectors.forEach(id => {
            const el = document.getElementById(id);
            if(el) el.innerHTML = (id === "betParticipantSelect" ? '<option value="">-- 請選擇 --</option>' : '<option value="all">全部</option>') + participantsList.map(p => `<option value="${p}">${p}</option>`).join('');
        });
        const homeSelect = document.getElementById("homeParticipantSelect");
        if(homeSelect) homeSelect.innerHTML = '<option value="all">全部</option>' + participantsList.map(p => `<option value="${p}">${p}</option>`).join('');
    }
    
    window.removeParticipant = async function(name) {
        if (!confirm("刪除?")) return;
        await sbClient.from('participants').delete().eq('name', name);
        await loadAllParticipants();
    };
    
    async function loadAllRaceDays() {
        const { data, error } = await sbClient.from('race_days').select('race_date').order('race_date');
        if (!error && data) raceDaysList = data.map(d => d.race_date);
        document.getElementById("raceDateList").innerHTML = raceDaysList.map(d => `<li>📅 ${d} <button class="secondary" onclick="removeRaceDay('${d}')">刪除</button></li>`).join('');
        const dateSelect = document.getElementById("betRaceDate");
        if(dateSelect) dateSelect.innerHTML = raceDaysList.map(d => `<option value="${d}">${d}</option>`).join('');
        const manageFilter = document.getElementById("manageRaceDateFilter");
        if(manageFilter) manageFilter.innerHTML = '<option value="all">全部</option>' + raceDaysList.map(d => `<option value="${d}">${d}</option>`).join('');
        let nextDay = raceDaysList.find(d => d >= new Date().toISOString().slice(0,10)) || raceDaysList[0];
        if (nextDay && dateSelect) dateSelect.value = nextDay;
    }
    
    window.removeRaceDay = async function(date) {
        if (!confirm("刪除賽日?")) return;
        await sbClient.from('race_days').delete().eq('race_date', date);
        await loadAllRaceDays();
    };
    
    async function refreshHomePage() {
        const raceFilter = document.getElementById("homeRaceSelect").value;
        const personFilter = document.getElementById("homeParticipantSelect").value;
        const targetDay = raceDaysList.find(d => d >= new Date().toISOString().slice(0,10)) || raceDaysList[0];
        if(!targetDay) return;
        const { data, error } = await sbClient.from('bets').select('*').eq('race_date', targetDay);
        if (error) return;
        let filtered = data || [];
        if (raceFilter !== 'all') filtered = filtered.filter(b => b.race_no == raceFilter);
        if (personFilter !== 'all') filtered = filtered.filter(b => b.participant === personFilter);
        const tbody = document.querySelector("#homeBetTable tbody");
        if (filtered.length === 0) { tbody.innerHTML = "<tr><td colspan='6'>暫無投注紀錄</td></tr>"; return; }
        tbody.innerHTML = filtered.map(b => `<tr><td>第 ${b.race_no} 場</td><td>${b.participant}</td><td>${b.bet_type || '-'}</td><td>${b.bet_detail}</td><td>$${b.amount}</td><td>${b.reason || '-'}</td></tr>`).join('');
    }
    
    async function refreshSelectors() {
        const raceOptions = '<option value="all">全部</option>' + Array.from({length:12}, (_,i) => `<option value="${i+1}">第 ${i+1} 場</option>`).join('');
        const homeSelect = document.getElementById("homeRaceSelect");
        if(homeSelect) homeSelect.innerHTML = raceOptions;
        const betRaceNo = document.getElementById("betRaceNo");
        if(betRaceNo) betRaceNo.innerHTML = raceOptions.replace('value="all"', 'value="1"');
    }
    
    async function loadAllBetsForManage() {
        const { data, error } = await sbClient.from('bets').select('*').order('race_date', { ascending: false });
        if (error) return;
        allBets = data || [];
        applyManageFilters();
    }
    
    function applyManageFilters() {
        const pFilter = document.getElementById("manageParticipantFilter").value;
        const dFilter = document.getElementById("manageRaceDateFilter").value;
        let filtered = allBets;
        if (pFilter !== 'all') filtered = filtered.filter(b => b.participant === pFilter);
        if (dFilter !== 'all') filtered = filtered.filter(b => b.race_date === dFilter);
        const tbody = document.querySelector("#manageBetsTable tbody");
        if (filtered.length === 0) { tbody.innerHTML = "<tr><td colspan='8'>暫無投注紀錄</td></tr>"; return; }
        tbody.innerHTML = filtered.map(b => `<tr><td>${b.id}</td><td>${b.participant}</td><td>${b.race_date}</td><td>第 ${b.race_no} 場</td><td>${b.bet_type || '-'}</td><td>${b.bet_detail}</td><td>$${b.amount}</td><td><button class="secondary small" onclick="editBet(${b.id})">✏️ 編輯</button> <button class="danger small" onclick="deleteBet(${b.id})">🗑️ 刪除</button></td></tr>`).join('');
    }
    
    window.editBet = async function(id) {
        const bet = allBets.find(b => b.id === id);
        if (!bet) return;
        const newDetail = prompt("編輯投注詳情:", bet.bet_detail);
        if (newDetail === null) return;
        const newAmount = parseInt(prompt("編輯金額:", bet.amount));
        if (isNaN(newAmount)) return;
        await sbClient.from('bets').update({ bet_detail: newDetail, amount: newAmount }).eq('id', id);
        await loadAllBetsForManage();
    };
    
    window.deleteBet = async function(id) {
        if (!confirm("確定刪除？")) return;
        await sbClient.from('bets').delete().eq('id', id);
        await loadAllBetsForManage();
    };
    
    async function refreshMonthSelector() {
        const { data } = await sbClient.from('bets').select('race_date');
        if (!data) return;
        let months = [...new Set(data.map(b => b.race_date.slice(0,7)))].sort().reverse();
        let selector = document.getElementById("monthSelector");
        if(selector) selector.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join('');
        if (months.length) await displayMonthlyStats(months[0]);
    }
    
    async function displayMonthlyStats(month) {
        const { data } = await sbClient.from('bets').select('*').ilike('race_date', `${month}%`);
        if (!data || !data.length) { document.getElementById("monthlyStatsContainer").innerHTML = "<div>無資料</div>"; return; }
        let stats = new Map();
        data.forEach(b => {
            if (!stats.has(b.participant)) stats.set(b.participant, { stake:0, profit:0, winCount:0, total:0 });
            let s = stats.get(b.participant);
            s.total++; s.stake += b.amount;
            if (b.is_win) { s.profit += b.amount; s.winCount++; }
            else s.profit -= b.amount;
        });
        let html = '<div class="stat-cards">';
        for (let [name, s] of stats) {
            let winRate = s.total ? (s.winCount/s.total*100).toFixed(1) : 0;
            let roi = s.stake ? (s.profit/s.stake*100).toFixed(1) : 0;
            html += `<div class="stat-item"><div class="stat-label">${name}</div><div class="stat-value">${winRate}%</div><div>勝率</div><div>回報率 ${roi}%</div><div>總投注:$${s.stake} | 淨利:$${s.profit}</div></div>`;
        }
        html += '</div>';
        document.getElementById("monthlyStatsContainer").innerHTML = html;
    }
    
    function bindEvents() {
        document.getElementById("refreshHomeBtn").onclick = refreshHomePage;
        document.getElementById("refreshManageBtn").onclick = loadAllBetsForManage;
        document.getElementById("manageParticipantFilter")?.addEventListener("change", () => applyManageFilters());
        document.getElementById("manageRaceDateFilter")?.addEventListener("change", () => applyManageFilters());
        document.getElementById("betForm").onsubmit = async (e) => {
            e.preventDefault();
            const participant = document.getElementById("betParticipantSelect").value;
            if (!participant) return alert("請選擇參賽者");
            const available = await calculateAvailableCapital(participant);
            const amount = parseInt(document.getElementById("betAmount").value);
            if (amount > available) return alert(`可用本金不足！本月剩餘 $${available}`);
            const raceDate = document.getElementById("betRaceDate").value;
            const raceNo = parseInt(document.getElementById("betRaceNo").value);
            const betType = document.getElementById("betBetType").value;
            if (!betType) return alert("請選擇玩法");
            let betSubType = "";
            if (["二重彩", "三重彩", "四重彩"].includes(betType)) {
                betSubType = document.getElementById("betSubType").value;
                if (!betSubType) return alert("請選擇子玩法");
            }
            const detail = document.getElementById("betDetail").value.trim();
            const reason = document.getElementById("betReason").value;
            if (!raceDate || !detail) return alert("請完整填寫");
            const insertData = { participant, race_date: raceDate, race_no: raceNo, bet_type: betType, bet_detail: detail, amount, reason, is_win: false };
            if (betSubType) insertData.bet_sub_type = betSubType;
            const { error } = await sbClient.from('bets').insert([insertData]);
            if (error) alert("儲存失敗: " + error.message);
            else { alert("投注成功"); e.target.reset(); await refreshHomePage(); await refreshMonthSelector(); await loadAllBetsForManage(); await updateCapitalDisplay(participant); }
        };
        document.getElementById("addParticipantBtn").onclick = async () => {
            let name = document.getElementById("newParticipantName").value.trim();
            if (name && !participantsList.includes(name)) {
                await sbClient.from('participants').insert([{ name }]);
                await loadAllParticipants();
                await ensureMonthlyCapital();
                document.getElementById("newParticipantName").value = "";
            }
        };
        document.getElementById("addRaceDateBtn").onclick = async () => {
            let date = document.getElementById("newRaceDate").value;
            if (date && !raceDaysList.includes(date)) {
                await sbClient.from('race_days').insert([{ race_date: date }]);
                await loadAllRaceDays();
            }
        };
        document.getElementById("refreshDataBtn").onclick = () => displayMonthlyStats(document.getElementById("monthSelector").value);
        document.getElementById("clearBetForm").onclick = () => document.getElementById("betForm").reset();
    }
</script>
</body>
</html>
